<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>تسجيل الدخول - النظام المحاسبي</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Almarai:wght@300;400;700;800&family=Tajawal:wght@700;900&display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Almarai', sans-serif; }
        .font-headline { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-[#f8f9ff] text-[#0b1c30] min-h-screen flex items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-[#006948]/10 text-[#006948] rounded-full flex items-center justify-center mx-auto mb-4 text-3xl font-headline font-bold">
                $
            </div>
            <h1 class="font-headline text-3xl font-extrabold text-[#006948]">دفتر الأستاذ</h1>
            <p class="text-sm text-gray-500 mt-2">يرجى إدخال كلمة المرور للوصول إلى الحسابات السيادية</p>
        </div>
        
        {% if error %}
        <div class="bg-red-50 text-red-700 p-4 rounded-lg mb-6 text-sm font-bold text-center border border-red-100">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-6">
                <label class="block text-sm font-bold text-gray-700 mb-2">كلمة المرور</label>
                <input type="password" name="password" required class="w-full bg-[#eff4ff] border-0 rounded-lg px-4 py-3 focus:ring-2 focus:ring-[#006948] transition-all text-center" dir="ltr" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-[#006948] to-[#00855d] text-white font-bold rounded-lg py-3 hover:shadow-lg hover:shadow-[#006948]/30 transition-all">
                دخول للنظام
            </button>
        </form>
    </div>
</body>
</html>
